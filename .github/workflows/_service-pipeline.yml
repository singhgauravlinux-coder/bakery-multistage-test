name: Service pipeline (reusable)

# ---------------------------------------------------------------------------
# CI ONLY. This builds an image and bumps its tag in the target overlay's
# kustomization.yaml, then commits that to main. It never talks to a
# cluster - Argo CD watches k8s/overlays/{dev,uat,production} in this repo
# and reconciles the live state itself (see argocd/*.yaml). GitHub Actions
# and Argo CD each own exactly one half:
#
#   GitHub Actions (this file): build image -> push to GHCR -> write the new
#     tag into git, one environment at a time.
#   Argo CD (out of this repo's runtime, configured via argocd/*.yaml):
#     notices the git commit -> applies the diff to the cluster -> reports
#     health/sync status back.
#
# Every service gets a thin caller workflow (.github/workflows/<service>.yml)
# that just does:
#
#   jobs:
#     pipeline:
#       uses: ./.github/workflows/_service-pipeline.yml
#       with:
#         service: <service-name>
#       secrets: inherit
#
# so changing the pipeline for all 25 services means editing this one file,
# while every service still gets its own independent workflow run, its own
# path filter, and its own promotion history in the Actions tab.
#
# Promotion gates: the "bump-uat" and "bump-production" jobs target GitHub
# Environments of the same name. Add required reviewers to those
# environments (Settings -> Environments) to turn this into manual approval
# gates - dev's tag bump commits automatically, uat/production wait for
# sign-off before their commit (and therefore Argo CD's sync) happens.
# ---------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      service:
        description: "Directory name under services/, e.g. auth-service"
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  # ------------------------------------------------------------ build image
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ inputs.service }}
          tags: |
            type=raw,value=${{ steps.sha.outputs.short_sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/${{ inputs.service }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ inputs.service }}
          cache-to: type=gha,mode=max,scope=${{ inputs.service }}

  # ------------------------------------------------------------ bump: dev
  bump-dev:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: dev
    concurrency:
      group: bump-image-dev-${{ inputs.service }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/bump-image
        with:
          service: ${{ inputs.service }}
          environment: dev
          overlay: k8s/overlays/dev
          image_tag: ${{ needs.build.outputs.short_sha }}

  # ------------------------------------------------------------ bump: uat
  bump-uat:
    needs: [build, bump-dev]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: uat
    concurrency:
      group: bump-image-uat-${{ inputs.service }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/bump-image
        with:
          service: ${{ inputs.service }}
          environment: uat
          overlay: k8s/overlays/uat
          image_tag: ${{ needs.build.outputs.short_sha }}

  # ------------------------------------------------------- bump: production
  bump-production:
    needs: [build, bump-uat]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: production
    concurrency:
      group: bump-image-production-${{ inputs.service }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/bump-image
        with:
          service: ${{ inputs.service }}
          environment: production
          overlay: k8s/overlays/production
          image_tag: ${{ needs.build.outputs.short_sha }}
