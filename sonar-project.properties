# SonarQube configuration — Crumb & Ember bakery platform
sonar.projectKey=bakery-multistage
sonar.projectName=Crumb & Ember Bakery Platform
sonar.projectVersion=1.1.0

sonar.sources=services,db
sonar.tests=services
sonar.test.inclusions=services/**/test/**/*.test.js

# Keep generated/vendored/static assets out of analysis
sonar.exclusions=**/node_modules/**,**/package-lock.json,services/frontend/index.legacy.html,docs/assets/**,k8s/**,argocd/**

sonar.javascript.node.maxspace=4096
sonar.sourceEncoding=UTF-8

# Duplication: single-file microservices intentionally share small helper
# libs (client-info/audit) so each container stays self-contained.
sonar.cpd.exclusions=services/*/lib/**
