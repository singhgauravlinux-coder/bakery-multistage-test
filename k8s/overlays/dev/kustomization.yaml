apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ---------------------------------------------------------------------------
# DEV overlay
#   - one namespace per env, everything else inherited from ../../base
#   - 1 replica per service (cheap, fast feedback)
#   - images are pinned per-service by the service's own CI pipeline via
#     `kustomize edit set image` (see .github/workflows/_service-pipeline.yml)
# ---------------------------------------------------------------------------

namespace: bakery-dev

resources:
- ../../base
- ../../base/ingress

commonLabels:
  environment: dev

  # Every service Deployment has exactly one container, so a positional
  # JSON6902 patch (index 0) works regardless of container name and applies
  # identically to all 25 services in one shot.
namespace: bakery-dev

resources:
- ../../base
- ../../base/ingress

commonLabels:
  environment: dev
  




patches:
- path: patch-ingress-host.yaml
  target:
    kind: Ingress
    name: bakery-ingress
- path: patch-ingress-middleware.yaml
  target:
    kind: Ingress
    name: bakery-ingress
- path: patch-db-ingress-host.yaml
  target:
    kind: Ingress
    name: bakery-db-ingress
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 150m
          memory: 192Mi

    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    labelSelector: app.kubernetes.io/part-of=crumb-and-ember

# Image tags are rewritten in-place by each service's pipeline, e.g.:
#   images:
#     - name: ghcr.io/OWNER/bakery-language/auth-service
#       newTag: <short-sha>
images:
- name: ghcr.io/singhgauravlinux-coder/bakery-multistage-test/order-service
  newName: ghcr.io/singhgauravlinux-coder/bakery-multistage-test/order-service
  newTag: 2e71aee
- name: ghcr.io/singhgauravlinux-coder/bakery-multistage-test/review-service
  newName: ghcr.io/singhgauravlinux-coder/bakery-multistage-test/review-service
  newTag: 2e71aee
- name: ghcr.io/singhgauravlinux-coder/bakery-multistage-test/user-service
  newName: ghcr.io/singhgauravlinux-coder/bakery-multistage-test/user-service
  newTag: 2e71aee
