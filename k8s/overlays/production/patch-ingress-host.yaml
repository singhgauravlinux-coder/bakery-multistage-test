apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bakery-ingress
spec:
  rules:
    - host: bakery.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8080
