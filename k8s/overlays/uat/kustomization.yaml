apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ---------------------------------------------------------------------------
# UAT overlay - mirrors production shape (2 replicas) but on smaller
# resource requests, so sign-off testing runs on real rolling-update
# behaviour without paying full prod cost.
# ---------------------------------------------------------------------------

namespace: bakery-uat

resources:
- ../../base
- ../../base/ingress

commonLabels:
  environment: uat






patches:
- path: patch-ingress-host.yaml
  target:
    kind: Ingress
    name: bakery-ingress
- path: patch-ingress-middleware.yaml
  target:
    kind: Ingress
    name: bakery-ingress
- path: patch-db-ingress-host.yaml
  target:
    kind: Ingress
    name: bakery-db-ingress
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: 50m
          memory: 98Mi
        limits:
          cpu: 200m
          memory: 220Mi

    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
    labelSelector: app.kubernetes.io/part-of=crumb-and-ember

images:
- name: ghcr.io/singhgauravlinux-coder/bakery-multistage-test/baking-schedule-service
  newName: ghcr.io/singhgauravlinux-coder/bakery-multistage-test/baking-schedule-service
  newTag: 2e71aee
- name: ghcr.io/singhgauravlinux-coder/bakery-multistage-test/cart-service
  newName: ghcr.io/singhgauravlinux-coder/bakery-multistage-test/cart-service
  newTag: 2e71aee
- name: ghcr.io/singhgauravlinux-coder/bakery-multistage-test/order-service
  newName: ghcr.io/singhgauravlinux-coder/bakery-multistage-test/order-service
  newTag: 2e71aee
- name: ghcr.io/singhgauravlinux-coder/bakery-multistage-test/review-service
  newName: ghcr.io/singhgauravlinux-coder/bakery-multistage-test/review-service
  newTag: 2e71aee
- name: ghcr.io/singhgauravlinux-coder/bakery-multistage-test/user-service
  newName: ghcr.io/singhgauravlinux-coder/bakery-multistage-test/user-service
  newTag: 2e71aee
