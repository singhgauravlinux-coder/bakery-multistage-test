# Authelia — TOTP second factor in front of the Adminer DB ingress.
#
# Flow: browser hits db.bakery.local -> Traefik forwardAuth middleware calls
# Authelia's /api/verify -> if not authenticated, Authelia redirects to its
# own portal at auth.bakery.local for password + TOTP code -> on success
# Traefik lets the original request through to Adminer.
#
# First-time setup for a user:
#   1. Generate a password hash:
#        docker run --rm authelia/authelia:4 authelia crypto hash generate argon2 --password 'CHANGE-ME'
#      and paste the result into the users_database.yaml ConfigMap below,
#      replacing the placeholder hash.
#   2. Visit http://auth.bakery.local, sign in with that password — Authelia
#      will prompt you to register a TOTP device (Google Authenticator, 1Password,
#      etc.) on first login and store the secret in its own encrypted storage
#      (the authelia-data PVC below), not in this manifest.
#   3. From then on, db.bakery.local requires password + current TOTP code.
#
# CHANGE the placeholder secrets in bakery-authelia-secret before any real
# deployment, or manage this Secret with your secret store instead.
apiVersion: v1
kind: Secret
metadata:
  name: bakery-authelia-secret
  namespace: bakery
  labels:
    app.kubernetes.io/part-of: crumb-and-ember
type: Opaque
stringData:
  # 3 independent random strings — used to sign sessions/cookies, encrypt
  # Authelia's storage (including TOTP secrets), and derive JWTs for the
  # identity-verification flows (password reset etc. within Authelia itself).
  AUTHELIA_SESSION_SECRET: change-me-session-secret-min-20-chars
  AUTHELIA_STORAGE_ENCRYPTION_KEY: change-me-storage-encryption-key-min-20-chars
  AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET: change-me-jwt-secret-min-20-chars
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bakery-authelia-config
  namespace: bakery
  labels:
    app.kubernetes.io/part-of: crumb-and-ember
data:
  configuration.yml: |
    theme: auto
    log:
      level: info

    totp:
      issuer: 'Crumb & Ember'
      period: 30
      skew: 1

    authentication_backend:
      file:
        path: /config/users/users_database.yml

    access_control:
      default_policy: deny
      rules:
        - domain: 'auth.bakery.local'
          policy: bypass
        - domain: 'db.bakery.local'
          policy: two_factor

    session:
      name: authelia_session
      same_site: lax
      expiration: 1h
      inactivity: 15m
      domain: bakery.local
      cookies:
        - domain: bakery.local
          authelia_url: 'http://auth.bakery.local'

    regulation:
      max_retries: 3
      find_time: 2m
      ban_time: 5m

    storage:
      local:
        path: /data/db.sqlite3

    notifier:
      # No real SMTP configured for this test stack — password-reset /
      # identity-verification emails from Authelia itself are written to
      # this file instead. TOTP enrollment does not need the notifier.
      filesystem:
        filename: /data/notifications.txt
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bakery-authelia-users
  namespace: bakery
  labels:
    app.kubernetes.io/part-of: crumb-and-ember
data:
  # Placeholder account — REPLACE the password hash before relying on this
  # (see instructions at the top of this file). Username: dbadmin.
  users_database.yml: |
    users:
      dbadmin:
        displayname: "DB Admin"
        password: "$argon2id$v=19$m=65536,t=3,p=4$CHANGE$ME$CHANGE$ME$CHANGE$ME"
        email: dbadmin@crumbandember.dev
        groups:
          - admins
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authelia
  namespace: bakery
  labels:
    app: authelia
    app.kubernetes.io/part-of: crumb-and-ember
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authelia
  template:
    metadata:
      labels:
        app: authelia
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: authelia
          image: authelia/authelia:4
          args: ["--config=/config/configuration.yml"]
          ports:
            - containerPort: 9091
          envFrom:
            - secretRef:
                name: bakery-authelia-secret
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /config/configuration.yml
              subPath: configuration.yml
              readOnly: true
            - name: users
              mountPath: /config/users/users_database.yml
              subPath: users_database.yml
              readOnly: true
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /api/health
              port: 9091
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 9091
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: bakery-authelia-config
        - name: users
          configMap:
            name: bakery-authelia-users
        - name: data
          persistentVolumeClaim:
            claimName: authelia-data
---
# Persistent storage for Authelia's own sqlite DB — this is where registered
# TOTP secrets and active sessions live. Without this being a real PVC,
# every pod restart would wipe everyone's TOTP enrollment.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: authelia-data
  namespace: bakery
  labels:
    app.kubernetes.io/part-of: crumb-and-ember
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: authelia
  namespace: bakery
  labels:
    app: authelia
spec:
  selector:
    app: authelia
  ports:
    - port: 9091
      targetPort: 9091
