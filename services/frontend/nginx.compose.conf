worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Structured JSON access logs on stdout, matching the Node services'
    # log shape (service / level / time) for uniform collection.
    log_format json_combined escape=json
      '{'
        '"time":"$time_iso8601",'
        '"service":"frontend",'
        '"level":"info",'
        '"event":"http_request",'
        '"remoteAddr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytesSent":$body_bytes_sent,'
        '"referer":"$http_referer",'
        '"userAgent":"$http_user_agent",'
        '"requestTimeSec":$request_time,'
        '"requestId":"$http_x_request_id"'
      '}';
    access_log /dev/stdout json_combined;

    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/css application/javascript application/json text/html;

    # Writable temp paths so the container can run as a non-root user.
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location /healthz {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"ok","service":"frontend"}';
        }

        # docker-compose only: route API calls to the gateway container.
        # (In Kubernetes the nginx Ingress handles /api instead.)
        location /api/ {
            proxy_pass http://api-gateway:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Request-Id $http_x_request_id;
            # Real client identity for downstream audit/security logs.
            # $proxy_add_x_forwarded_for appends this hop while preserving
            # whatever an upstream Traefik/edge LB already recorded, so the
            # left-most public entry is always the true client address.
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header User-Agent $http_user_agent;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
